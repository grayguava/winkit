# DiskWatch configuration
# Drives to check for filesystem health
Drives=C,D

# smartctl path (must be on PATH or provide full path)
SmartCtlPath=smartctl

# Devices to query with smartctl
SmartDevices=/dev/sda

# SMART attribute IDs to track (comma-separated)
#  5 = Reallocated_Sector_Ct
#  9 = Power_On_Hours
#197 = Current_Pending_Sector
#198 = Offline_Uncorrectable
#190 = Airflow_Temperature_Cel (or Temperature_Celsius)
SmartAttrs=5,9,197,198,190
